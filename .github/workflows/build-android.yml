name: Build GDLlama Android arm64

# Builds the xarillian/GDLlama GDExtension engine for Android arm64 (aarch64)
# on GitHub's free runners, and uploads the resulting .so as a downloadable
# artifact. Pixie's model is NOT involved here — this only compiles the engine.

on:
  workflow_dispatch:        # lets us run it by hand from the Actions tab
  push:
    branches: [ main ]      # also runs on every push to main

jobs:
  build:
    runs-on: ubuntu-latest  # free GitHub runner: ~4 CPU, 16 GB RAM
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build scons git python3

      - name: Install the NDK godot-cpp requires (r23.2.8568313)
        run: |
          # The pinned godot-cpp commit hardcodes NDK r23.2.8568313 (no override)
          # and its old scons toolchain needs that NDK's legacy per-API clang
          # wrappers, which newer NDKs (the runner's r29) have removed. So install
          # exactly r23 and use it for the whole build (one consistent NDK).
          echo "Runner's latest NDK: $ANDROID_NDK_LATEST_HOME"
          SDKMGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --install "ndk;23.2.8568313" >/dev/null
          test -d "$ANDROID_HOME/ndk/23.2.8568313" && echo "NDK r23.2.8568313 installed OK"

      - name: Clone the GDLlama engine source (+ submodules)
        run: |
          git clone --recursive https://github.com/xarillian/GDLlama.git engine
          cd engine
          git submodule update --init --recursive
          echo "--- engine tree ---"; ls
          echo "--- llama.cpp HEAD ---"; git -C llama.cpp log -1 --oneline || true

      - name: Generate godot-cpp bindings for Android (arm64)
        working-directory: engine/godot-cpp
        run: |
          # godot-cpp finds the NDK at $ANDROID_HOME/ndk/23.2.8568313, which we
          # installed in the previous step, so the default path now resolves.
          echo "ANDROID_HOME=$ANDROID_HOME"
          scons platform=android arch=arm64 target=template_release -j"$(nproc)"

      - name: Configure (CMake + Android NDK toolchain, static-linked single .so)
        working-directory: engine
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_HOME/ndk/23.2.8568313/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DLLAMA_VULKAN=OFF \
            -DLLAMA_METAL=OFF \
            -DLLAMA_CURL=OFF \
            -DGGML_OPENMP=OFF \
            -DGGML_NATIVE=OFF \
            -DCMAKE_C_FLAGS="-march=armv8.2-a+dotprod+fp16" \
            -DCMAKE_CXX_FLAGS="-march=armv8.2-a+dotprod+fp16" \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build
        working-directory: engine
        run: ninja -C build -j"$(nproc)"

      - name: Collect .so files
        run: |
          mkdir -p out
          find engine/build -name "*.so" -exec cp -v {} out/ \;
          echo "--- collected ---"; ls -la out

      # ── Speed-gap A/B probe (Pillar 1) ───────────────────────────────────────
      # Build a BARE llama-cli from the SAME engine/llama.cpp submodule, with the
      # SAME -march flags and the SAME NDK as the engine above. The only thing that
      # differs from our in-process engine is llama.cpp's own threadpool + main loop
      # vs our GDLlama/Godot async wrapper. Running this on the Pixel 7 isolates the
      # ~8x decode gap: if llama-cli also crawls -> it's our build/codegen; if it
      # hits ~6 tok/s -> the bottleneck is the Godot threadpool/async wrapper.
      - name: Configure bare llama-cli (same source, same arch flags, static)
        working-directory: engine
        run: |
          cmake -B build-cli -G Ninja llama.cpp \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_HOME/ndk/23.2.8568313/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_CURL=OFF \
            -DGGML_OPENMP=OFF \
            -DGGML_NATIVE=OFF \
            -DCMAKE_C_FLAGS="-march=armv8.2-a+dotprod+fp16" \
            -DCMAKE_CXX_FLAGS="-march=armv8.2-a+dotprod+fp16"

      - name: Build llama-cli
        working-directory: engine
        run: ninja -C build-cli llama-cli

      - name: Collect llama-cli
        run: |
          find engine/build-cli -name "llama-cli" -type f -exec cp -v {} out/ \;
          echo "--- collected (with cli) ---"; ls -la out
          file out/llama-cli || true

      - name: Verify ARM dotprod kernels actually compiled in
        run: |
          # The Pixel 7's big speedup for quantized matmul. If this is 0, the arch
          # flags didn't reach ggml's kernels and the engine will run ~15x too slow.
          OBJDUMP="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-objdump"
          SO=$(ls out/libgodot_llm*.so | head -1)
          N=$("$OBJDUMP" -d "$SO" | grep -cwE "sdot|udot")
          echo "dotprod (sdot/udot) instruction count: $N"
          if [ "$N" -lt 1 ]; then
            echo "::error::No dotprod instructions in $SO — ARM arch flags did not take effect"; exit 1
          fi
          echo "✅ dotprod kernels present ($N sdot/udot sites)"

      - name: Upload the engine .so
        uses: actions/upload-artifact@v4
        with:
          name: gdllama-android-arm64
          path: |
            out/*.so
            out/llama-cli
          if-no-files-found: error
